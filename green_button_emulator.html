<!DOCTYPE html>
<!-- Green Button Emulator — MOD-02b — v1.9.0 -->
<!-- Wrapper: loads green_button_app_v1_9_0.jsx via Babel standalone -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Button Emulator v1.9.0 — Wipomo / CCE</title>
  <meta name="description" content="Pre-construction synthetic Green Button load profile generator. NAESB ESPI XML and SDG&E CSV output. NREL ResStock archetypes, CEC Title 24 climate zones." />

  <!-- React 18 + ReactDOM (production UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone — transpiles JSX at runtime -->
  <!-- Pin to 7.x stable; do not use @latest in production -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0f1a; color: #e8f4ff; font-family: sans-serif; }
    #root { min-height: 100vh; }
    /* Loading indicator shown before React mounts */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #6b8db5;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="loading">LOADING…</div>
  <div id="root"></div>

  <script>
    // Hide loading indicator only after React has had a chance to render.
    // If root has no children after 5s, show an error so blank screen is diagnosable.
    function checkMount() {
      var loading = document.getElementById('loading');
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        if (loading) loading.style.display = 'none';
      } else {
        setTimeout(function () {
          var root2 = document.getElementById('root');
          if (!root2 || root2.children.length === 0) {
            if (loading) loading.textContent = 'ERROR — check browser console (F12)';
          } else {
            if (loading) loading.style.display = 'none';
          }
        }, 5000);
      }
    }
    // Poll briefly after page load
    window.addEventListener('load', function () {
      setTimeout(checkMount, 1000);
    });
  </script>

  <!--
    The functional module. Babel transpiles this at runtime.
    To update the app: replace green_button_app_v1_9_0.jsx with a new version
    and update the src attribute below. The version string in the title tag
    above should also be updated for deployment verification.
  -->
  <script type="text/babel" src="green_button_app_v1_9_0.jsx"></script>
</body>
</html>
