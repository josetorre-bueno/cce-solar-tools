    return 'super_off_peak';
  }
  if (h >= 16 && h < 21) return 'on_peak';
  if (!summer && (m === 3 || m === 4) && h >= 10 && h < 14) return 'super_off_peak';
  if ((h >= 6 && h < 16) || (h >= 21 && h < 24)) return 'off_peak';
  return 'super_off_peak';
}

function getNbtRate(ts, yearOffset, accEsc) {
  const m = ts.getMonth();
  const h = ts.getHours();
  const we = isWeekendOrHoliday(ts) ? 1 : 0;
  const yIdx = Math.min(yearOffset, 1);
  const baseRate = NBT_RATES[yIdx][m][h][we];
  const extraYears = Math.max(0, yearOffset - 1);
  return baseRate * Math.pow(1 + accEsc, extraYears);
}

// ── Bill computation ──────────────────────────────────────────────────────────
function computeBills(intervals, rates, annualPeakKw, yearOffset, accEsc, allowExport=true) {
  const { sdge, ce } = rates;
  let kwh = {on:0, off:0, sop:0};
  let peakAll = 0, peakOnPeak = 0;
  let exportCredit = 0;
  let peakExportKw = 0;

  for (const [ts, net] of intervals) {
    const period = getTouPeriod(ts);
    if (net >= 0) {
      if (period === 'on_peak') kwh.on += net;
      else if (period === 'off_peak') kwh.off += net;
      else kwh.sop += net;
      const kw = net * 4;
      if (kw > peakAll) peakAll = kw;
      if (period === 'on_peak' && kw > peakOnPeak) peakOnPeak = kw;
    } else {
      const exportKw = (-net) * 4;
      if (exportKw > peakExportKw) peakExportKw = exportKw;
      if (allowExport !== false) {
        const exportKwh = -net;
        const rate = getNbtRate(ts, yearOffset, accEsc);
        exportCredit += exportKwh * rate;
      }
    }
  }

  const totalKwh = kwh.on + kwh.off + kwh.sop;
  const ratchetFloor = annualPeakKw * sdge.ratchetFraction;
  const ncBilled = Math.max(peakAll, ratchetFloor);
  const ratchetActive = peakAll < ratchetFloor;

  const de = sdge.deliveryEnergy;
  const ge = sdge.generationEnergy;
  const dr = sdge.demandRates;

  const deliveryEnergy = kwh.on*de.on + kwh.off*de.off + kwh.sop*de.sop;
  const generationEnergy = kwh.on*ge.on + kwh.off*ge.off + kwh.sop*ge.sop;
  const onPeakDemand = peakOnPeak * dr.onPeak;
  const touDemand = peakOnPeak * dr.tou;
  const ncDemand = ncBilled * dr.nc;
  const wildfire = totalKwh * sdge.wildfire;
  const pcia = totalKwh * sdge.pcia;
  const incrProc = totalKwh * sdge.incrProc;
  const genCredit = -generationEnergy;
  const franchiseBase = sdge.customerCharge + deliveryEnergy + onPeakDemand + touDemand + ncDemand + wildfire + generationEnergy;
  const franchise = franchiseBase * sdge.franchiseRate;
  const stateReg = totalKwh * sdge.stateRegFee;
  const totalElectric = sdge.customerCharge + deliveryEnergy + onPeakDemand + touDemand + ncDemand + wildfire + generationEnergy + genCredit + pcia + incrProc + sdge.utilityCredit + sdge.econDevCredit;
  const sdgeTotal = totalElectric + franchise + stateReg - exportCredit;

  const ceEnergy = totalKwh * (ce.genRate + ce.ancRate);
  const ceDemand = peakOnPeak * ce.demandRate;
  const ceErs = totalKwh * ce.ersRate;
  const ceTotal = ceEnergy + ceDemand + ceErs;

  return {
    totalKwh, peakAll, peakOnPeak, ncBilled, ratchetActive, ratchetFloor,
    sdgeTotal, ceTotal, combinedTotal: sdgeTotal + ceTotal,
    exportCredit, peakExportKw,
    breakdown: { deliveryEnergy, onPeakDemand, touDemand, ncDemand, wildfire, generationEnergy, franchise, stateReg, pcia, ceEnergy, ceDemand, exportCredit }
  };
}

// ── Parse UtilityAPI CSV ──────────────────────────────────────────────────────
function parseCsvRow(line) {
  const cols = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseIntervalCsv(text) {
  const lines = text.trim().split('\n');
  const header = parseCsvRow(lines[0]).map(h => h.replace(/"/g,'').trim());
  const startIdx = header.findIndex(h => /interval_start/i.test(h));
  const kwhIdx = header.findIndex(h => /interval_kwh/i.test(h));
  if (startIdx < 0 || kwhIdx < 0) throw new Error('CSV missing interval_start or interval_kWh columns');
  const intervals = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCsvRow(lines[i]);
    if (!cols[startIdx]) continue;
    const rawTs = cols[startIdx].replace(/"/g,'').trim();
    const ts = new Date(rawTs.replace(' ', 'T'));
    const kwh = parseFloat(cols[kwhIdx]);
    if (!isNaN(ts.getTime()) && !isNaN(kwh)) intervals.push([ts, kwh]);
  }
  intervals.sort((a,b) => a[0]-b[0]);
  return intervals;
}

// ── Parse PVWatts hourly CSV (1 kW reference) ─────────────────────────────────
// Returns a 12×24 lookup table: pvLookup[month-1][hour] = avg kWh per hour
// for a 1 kW DC system. Averaging by month+hour makes the profile independent
// of the load data start date — any interval can look up its PV production
// using only its calendar month and hour-of-day.
function parsePvwattsCsv(text) {
  // Handles two formats:
  // 1. Dual-axis tracker export: tab-delimited, columns "Hour" + "AC_kWh", values in kWh/hr
  // 2. PVWatts web calculator CSV: comma-delimited, multi-row metadata header,
  //    data columns include "AC System Output (W)" as last column, values in Watts
  const lines = text.trim().split('\n');

  // Detect delimiter
  const delim = lines[0].includes('\t') ? '\t' : ',';

  // Find the header row — the first line whose first token is a recognizable column name
  // PVWatts CSV has metadata rows above the actual column header
  let headerIdx = 0;
  let header = [];
  for (let i = 0; i < Math.min(lines.length, 20); i++) {
    const cols = lines[i].split(delim).map(c => c.trim().replace(/"/g,''));
    // Header row contains text labels, not numbers
    if (isNaN(parseFloat(cols[0])) && cols.length >= 2) {
      header = cols.map(c => c.toLowerCase());
      headerIdx = i;
      break;
    }
  }

  // Find AC output column
  // Tracker format: "ac_kwh"
  // PVWatts format: "ac system output (w)" — typically last column
  let acIdx = header.findIndex(h => /ac_kwh/i.test(h));
  let scaleToKwh = 1.0;  // tracker output already in kWh/hr
  if (acIdx < 0) {
    // Look for PVWatts "AC System Output (W)" — usually last data column
    acIdx = header.findIndex(h => /ac system output/i.test(h) || h === 'ac output (w)');
    if (acIdx < 0) acIdx = header.length - 1;  // fallback to last column
    scaleToKwh = 1 / 1000;  // Watts → kWh/hr (one hour intervals)
  }

  // Data starts on the line after the header
  const dataStart = headerIdx + 1;
  const hourly = [];
  for (let i = dataStart; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = lines[i].split(delim);
    const raw = parseFloat(cols[acIdx]);
    if (!isNaN(raw)) hourly.push(raw * scaleToKwh);
  }
  if (hourly.length < 8760) throw new Error(`PV profile has ${hourly.length} hours, expected 8760`);

  // Build 12×24 lookup by averaging TMY hours with the same month+hour
  // TMY starts Jan 1 hour 0 — day lengths: 31,28,31,30,31,30,31,31,30,31,30,31
  const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];
  const sums   = Array.from({length:12}, () => new Array(24).fill(0));
  const counts = Array.from({length:12}, () => new Array(24).fill(0));
  let idx = 0;
  for (let m = 0; m < 12; m++) {
    for (let d = 0; d < daysInMonth[m]; d++) {
      for (let h = 0; h < 24; h++) {
        sums[m][h]   += hourly[idx] || 0;
        counts[m][h] += 1;
        idx++;
      }
    }
  }
  const lookup = sums.map((row, m) => row.map((s, h) => s / counts[m][h]));
  return lookup;  // pvLookup[month-1][hour]
}

// Get PV production for a single 15-min interval given the lookup table
// Returns kWh for a 1 kW DC system (divide hour average by 4 for 15-min)
function getPvKwh(pvLookup, ts) {
  const m = ts.getMonth();   // 0-11
  const h = ts.getHours();   // 0-23
  return (pvLookup[m][h] || 0) / 4;
}

// ── Sizing sweep ──────────────────────────────────────────────────────────────
function runSizingSweep(intervals, pvLookup, cfg) {
  const { rates, years, discountRate, utilEsc, accEsc, costPerWatt } = cfg;
  let annualPeakKw = cfg.annualPeakKw;

  // Group intervals by calendar month key for repeating across years
  const byMonth = {};
  for (const [ts, kwh] of intervals) {
    const key = `${String(ts.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push([ts, kwh]);
  }
  // Months present in the data (use only months we actually have data for)
  const monthKeys = Object.keys(byMonth).sort();

  const sizes = [];
  for (let s = 0; s <= 2500; s += 50) sizes.push(s);

  const results = sizes.map(sizeKw => {
    let npv = 0;
    const annualTable = [];
    let rollingPeakKw = cfg.annualPeakKw;

    for (let yr = 0; yr < years; yr++) {
      const esc = Math.pow(1 + utilEsc, yr);
      const scaledRates = scaleRates(rates, esc);
      let yearSavings = 0;
      let yearExport = 0;
      let yearBaseCost = 0;
      let yearSolarCost = 0;
      let yearPeakExport = 0;

      for (const mk of monthKeys) {
        const monthIntervals = byMonth[mk];

        // Net-load intervals: subtract PV using month+hour lookup (no date alignment assumption)
        const netIntervals = monthIntervals.map(([ts, kwh]) => {
          const pvKwh = getPvKwh(pvLookup, ts) * sizeKw;
          return [ts, kwh - pvKwh];
        });

        const baseRes  = computeBills(monthIntervals, scaledRates, rollingPeakKw, yr, cfg.accEsc, true);
        const solarRes = computeBills(netIntervals,   scaledRates, rollingPeakKw, yr, cfg.accEsc, cfg.allowExport !== false);

        yearBaseCost  += baseRes.combinedTotal;
        yearSolarCost += solarRes.combinedTotal;
        yearExport    += solarRes.exportCredit;
        if (solarRes.peakExportKw > yearPeakExport) yearPeakExport = solarRes.peakExportKw;

        // Update rolling annual peak from actual simulated peaks
        if (solarRes.peakAll > rollingPeakKw) rollingPeakKw = solarRes.peakAll;
      }

      yearSavings = yearBaseCost - yearSolarCost;
      const discFactor = 1 / Math.pow(1 + discountRate, yr + 1);
      npv += yearSavings * discFactor;
      annualTable.push({
        year: yr + 1,
        savings: yearSavings,
        exportCredit: yearExport,
        discounted: yearSavings * discFactor,
        peakExportKw: yearPeakExport,
      });
    }

    const systemCost = sizeKw * 1000 * costPerWatt;
    const netNpv = npv - systemCost;
    const firstYearSavings = annualTable[0]?.savings || 0;

    const peakExportKw = annualTable.length ? annualTable[0].peakExportKw : 0;
    return { sizeKw, npv, netNpv, systemCost, annualTable, firstYearSavings, peakExportKw };
  });

  return results;
}

function scaleRates(rates, esc) {
  const r = JSON.parse(JSON.stringify(rates));
  const s = r.sdge;
  s.deliveryEnergy = { on: s.deliveryEnergy.on*esc, off: s.deliveryEnergy.off*esc, sop: s.deliveryEnergy.sop*esc };
  s.generationEnergy = { on: s.generationEnergy.on*esc, off: s.generationEnergy.off*esc, sop: s.generationEnergy.sop*esc };
  s.demandRates = { onPeak: s.demandRates.onPeak*esc, tou: s.demandRates.tou*esc, nc: s.demandRates.nc*esc };
  s.wildfire *= esc; s.pcia *= esc; s.incrProc *= esc; s.stateRegFee *= esc;
  r.ce.genRate *= esc; r.ce.ancRate *= esc; r.ce.demandRate *= esc;
  return r;
}

                <label style={labelStyle}>ACC export rate escalation (%/yr)</label>
                <input type="number" min="-5" max="15" step="0.1" value={accEsc} onChange={e=>setAccEsc(+e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>Installed cost ($/W DC)</label>
                <input type="number" min="0.5" max="5" step="0.05" value={costPerWatt} onChange={e=>setCostPerWatt(+e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>Incentives / grants (% of cost)</label>
                <input type="number" min="0" max="100" step="1" value={incentivePct} onChange={e=>setIncentivePct(+e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>Prior 12-mo peak demand (kW)</label>
                <input type="number" min="0" max="2000" step="1" value={annualPeakKw} onChange={e=>setAnnualPeakKw(+e.target.value)} style={inputStyle} />
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'10px',paddingTop:'18px'}}>
                <input type="checkbox" id="exportToggle" checked={allowExport} onChange={e=>setAllowExport(e.target.checked)} style={{width:'16px',height:'16px',cursor:'pointer'}} />
                <label htmlFor="exportToggle" style={{...labelStyle,margin:'0',cursor:'pointer',color:'var(--color-text-primary)'}}>Allow export to grid (NEM 3.0 credit)</label>
              </div>
            </div>
          </div>

          <div style={cardStyle}>
            <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 8px'}}>Rate config: AL-TOU2 winter (Mar 19–Apr 17, 2025) · validated against actual W1 SDG&E + CE bills · $0.00 error on Total Electric Charges</p>
            <p style={{fontSize:'11px',color:'var(--color-text-secondary)',margin:'4px 0 0',fontStyle:'italic'}}>Note: rate schedule optimization (testing whether an alternative rate improves economics with solar) is planned for a future version.</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',fontSize:'12px',color:'var(--color-text-secondary)'}}>
              <span>Delivery energy: $0.00686/kWh</span>
              <span>On-peak gen: $0.22774/kWh</span>
              <span>TOU demand: $46.18/kW</span>
              <span>CE flat rate: $0.11360/kWh</span>
            </div>
          </div>

          {status && <p style={{fontSize:'13px',color:'var(--color-text-secondary)',margin:'0',padding:'8px 12px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)'}}>{status}</p>}

          <button onClick={runAnalysis} disabled={running || !loadIntervals || !pvHourly} style={{padding:'10px 24px',fontSize:'14px',fontWeight:'500',background:'var(--color-text-primary)',color:'var(--color-background-primary)',border:'none',borderRadius:'var(--border-radius-md)',cursor: (!loadIntervals||!pvHourly||running)?'not-allowed':'pointer',opacity:(!loadIntervals||!pvHourly||running)?0.4:1,fontFamily:'var(--font-sans)',alignSelf:'flex-start'}}>
            {running ? 'Running…' : 'Run sizing analysis'}
          </button>
        </div>
      )}

      {tab === 'results' && results && optimalSize && (
        <div style={{display:'grid',gap:'16px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'12px'}}>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>optimal size</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{optimalSize.sizeKw} kW DC</p>
            </div>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>net system cost</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{sc(optimalSize.systemCost)}</p>
              <p style={{fontSize:'11px',color:'var(--color-text-secondary)',margin:'2px 0 0'}}>{incentivePct > 0 ? `after ${incentivePct}% incentive · gross ${sc(optimalSize.sizeKw*1000*costPerWatt)}` : `$${costPerWatt.toFixed(2)}/W installed`}</p>
            </div>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>simple payback</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{optimalSize.firstYearSavings > 0 ? (optimalSize.systemCost/optimalSize.firstYearSavings).toFixed(1)+' yr' : '—'}</p>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>net NPV ({years} yr)</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{sc(optimalSize.netNpv)}</p>
            </div>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>year 1 savings</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{sc(optimalSize.firstYearSavings)}</p>
            </div>
            <div style={metricCard}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>annual load kWh</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>{s(loadIntervals ? loadIntervals.reduce((sum,[,k])=>sum+k,0) : 0)}</p>
              <p style={{fontSize:'11px',color:'var(--color-text-secondary)',margin:'2px 0 0'}}>{s(loadIntervals ? loadIntervals.reduce((sum,[,k])=>sum+k,0)/12 : 0)} kWh/mo avg</p>
            </div>
            {allowExport && optimalSize.peakExportKw > 0 && (
            <div style={{...metricCard, gridColumn:'1/-1', background: optimalSize.peakExportKw > annualPeakKw ? 'var(--color-background-danger)' : metricCard.background}}>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'0 0 4px'}}>peak export (optimal size)</p>
              <p style={{fontSize:'22px',fontWeight:'500',margin:'0',color: optimalSize.peakExportKw > annualPeakKw ? 'var(--color-text-danger)' : 'var(--color-text-primary)'}}>{optimalSize.peakExportKw.toFixed(1)} kW</p>
              <p style={{fontSize:'11px',color:'var(--color-text-secondary)',margin:'2px 0 0'}}>
                {optimalSize.peakExportKw > annualPeakKw
                  ? `⚠ Exceeds peak import (${annualPeakKw} kW) — may require larger interconnection agreement`
                  : `Within peak import capacity (${annualPeakKw} kW) — no interconnection upgrade expected`}
              </p>
            </div>
            )}
          </div>

          <div style={{...cardStyle,padding:'0'}}>
            <div style={{padding:'16px 20px 8px',borderBottom:'0.5px solid var(--color-border-tertiary)'}}>
              <p style={{fontSize:'13px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>Net NPV vs system size</p>
            </div>
            <div style={{position:'relative',height:'220px',padding:'12px 20px 8px'}}>
              <canvas id="npvChart"></canvas>
            </div>
          </div>

          <div style={cardStyle}>
            <p style={{fontSize:'13px',fontWeight:'500',margin:'0 0 12px',color:'var(--color-text-primary)'}}>Size comparison</p>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',fontSize:'12px',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:'0.5px solid var(--color-border-tertiary)'}}>
                    {['Size (kW DC)','Annual Production','System Cost','Yr 1 Savings','Gross NPV','Net NPV','Payback'].map(h=>(
                      <th key={h} style={{textAlign:'right',padding:'6px 12px 6px 0',fontWeight:'500',color:'var(--color-text-secondary)',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {results.filter(r=>r.sizeKw>0).filter((_,i)=>i%2===0).map(r=>(
                    <tr key={r.sizeKw} style={{borderBottom:'0.5px solid var(--color-border-tertiary)',background: r.sizeKw===optimalSize.sizeKw ? 'var(--color-background-info)' : 'transparent'}}>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',fontWeight: r.sizeKw===optimalSize.sizeKw ? '500':'400',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{r.sizeKw}</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color:'var(--color-text-secondary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{s(Math.round(r.sizeKw * (pvHourly ? pvHourly.reduce((s,m,mi)=>s+m.reduce((ms,h)=>ms+h*[31,28,31,30,31,30,31,31,30,31,30,31][mi],0),0) : 0)))} kWh</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(r.systemCost)}</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(r.firstYearSavings)}</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(r.npv)}</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color: r.netNpv>0 ? 'var(--color-text-success)' : 'var(--color-text-danger)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(r.netNpv)}</td>
                      <td style={{textAlign:'right',padding:'5px 12px 5px 0',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{r.firstYearSavings>0?(r.systemCost/r.firstYearSavings).toFixed(1)+' yr':'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab === 'table' && optimalSize && (
        <div style={{display:'grid',gap:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <p style={{fontSize:'13px',fontWeight:'500',margin:'0',color:'var(--color-text-primary)'}}>Annual savings — {optimalSize.sizeKw} kW DC optimal system</p>
              <p style={{fontSize:'12px',color:'var(--color-text-secondary)',margin:'4px 0 0'}}>System cost: {sc(optimalSize.systemCost)} · {years}-year analysis · {utilEsc}%/yr utility escalation</p>
            </div>
            <button onClick={downloadCsv} style={{padding:'7px 14px',fontSize:'12px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',background:'var(--color-background-primary)',color:'var(--color-text-primary)',cursor:'pointer',fontFamily:'var(--font-sans)'}}>
              Download CSV
            </button>
          </div>
          <div style={{...cardStyle,padding:'0',overflowX:'auto'}}>
            <table style={{width:'100%',fontSize:'12px',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{borderBottom:'0.5px solid var(--color-border-tertiary)'}}>
                  {['Year','Annual savings','Export credit','Discounted savings','Cumulative (after cost)'].map(h=>(
                    <th key={h} style={{textAlign:'right',padding:'10px 16px',fontWeight:'500',color:'var(--color-text-secondary)',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(() => {
                  let cum = -optimalSize.systemCost;
                  return optimalSize.annualTable.map((row,i) => {
                    cum += row.savings;
                    const crossed = cum >= 0 && (cum - row.savings) < 0;
                    return (
                      <tr key={i} style={{borderBottom:'0.5px solid var(--color-border-tertiary)',background: crossed ? 'var(--color-background-success)' : 'transparent'}}>
                        <td style={{textAlign:'right',padding:'7px 16px',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{row.year}</td>
                        <td style={{textAlign:'right',padding:'7px 16px',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(row.savings)}</td>
                        <td style={{textAlign:'right',padding:'7px 16px',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(row.exportCredit)}</td>
                        <td style={{textAlign:'right',padding:'7px 16px',color:'var(--color-text-primary)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(row.discounted)}</td>
                        <td style={{textAlign:'right',padding:'7px 16px',fontWeight: cum<0?'400':'500', color: cum<0 ? 'var(--color-text-danger)' : 'var(--color-text-success)',fontFamily:'var(--font-mono)',fontSize:'11px'}}>{sc(cum)}</td>
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {!results && tab !== 'inputs' && (
        <div style={{padding:'40px',textAlign:'center',color:'var(--color-text-secondary)',fontSize:'13px'}}>
          Run an analysis on the inputs tab first.
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(PvSizingTool));

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</body>
</html>
