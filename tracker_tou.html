// ─── GEOCODE + PVWATTS FETCH ─────────────────────────────────────────────────
// Step 1: Nominatim (OpenStreetMap) geocodes address → lat/lon (free, no key)
// Step 2: PVWatts v8 called with lat/lon (address param not supported in v8)
async function geocodeAddress(address) {
  // Bare 5-digit US zip code — Nominatim resolves ambiguously without country context
  const cleaned = address.trim();
  const query = /^\d{5}$/.test(cleaned) ? `${cleaned}, USA` : cleaned;
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
  let res;
  try {
    res = await fetch(url, { headers: { "Accept-Language": "en" } });
  } catch (e) {
    throw new Error(`Geocoding network error: ${e.message}`);
  }
  if (!res.ok) throw new Error(`Geocoding failed: HTTP ${res.status}`);
  const results = await res.json();
  if (!results || results.length === 0) throw new Error(`Address not found: "${address}". Try a simpler address or city/state.`);
  return { lat: parseFloat(results[0].lat), lon: parseFloat(results[0].lon), display: results[0].display_name };
}

// Map user's expected bifacial gain % → albedo value for PVWatts
// bifaciality=0.7 (standard TOPCon/PERC bifacial module property, fixed)
// albedo drives the actual rear gain PVWatts calculates
function bifacialToAlbedo(gainPct) {
  if (gainPct <= 0)  return 0.2;   // monofacial: albedo irrelevant, use default
  if (gainPct <= 2)  return 0.12;  // dark gravel / asphalt  ~2%
  if (gainPct <= 3)  return 0.25;  // light gravel / concrete ~3%
  return              0.45;         // white concrete / paint  ~5%
}

async function fetchPVWatts({ lat, lon, systemCapacity, arrayType, tilt, azimuth, dcAcRatio, bifacial = 0 }) {
  const params = new URLSearchParams({
    api_key:         PVWATTS_KEY,
    lat,
    lon,
    system_capacity: systemCapacity,
    array_type:      arrayType,
    tilt,
    azimuth,
    dc_ac_ratio:     dcAcRatio,
    bifaciality:     bifacial > 0 ? 0.7 : 0,
    albedo:          bifacialToAlbedo(bifacial),
    losses:          LOSSES,
    timeframe:       "hourly",
    module_type:     1,
  });
  const url = `${PVWATTS_BASE}?${params}`;
  let res;
  try {
    res = await fetch(url);
  } catch (netErr) {
    throw new Error(`Network error reaching NLR API: ${netErr.message}`);
  }
  if (!res.ok) {
    let body = "";
    try { body = await res.text(); } catch(_) {}
    throw new Error(`PVWatts API returned HTTP ${res.status}. ${body.slice(0, 200)}`);
  }
  const data = await res.json();
  if (data.errors && data.errors.length > 0) throw new Error(data.errors.join("; "));
  // Hourly field is "ac" (Wh) when timeframe=hourly — convert to kWh
  const raw = data.outputs.ac;
  if (!raw || !Array.isArray(raw)) {
    throw new Error(`PVWatts returned no hourly data. Keys: ${Object.keys(data.outputs || {}).join(", ")}`);
  }
  return {
    ac_hourly:    raw.map(w => w / 1000),
    station_info: data.station_info,
  };
}

// ─── EXACT HOURLY COMPUTATION ────────────────────────────────────────────────
// PVWatts hourly returns 8,760 Wh values (already converted to kWh on fetch).
// Hour index i maps to: month via cumulative day count, hour-of-day = i % 24.
// We sum kWh by TOU period for each month → exact dollar values, no shape model.

// Precomputed cumulative hours at start of each month (non-leap year)
const MONTH_START_HOUR = [0,744,1416,2160,2880,3624,4344,5088,5832,6552,7296,8016];

function computeFromHourly(acHourlyFixed, acHourlyTracker, utility) {
  const tou = TOU_RATES[utility];
  let fixedKwh = 0, trackerKwh = 0;
  let fixedValue = 0, trackerValue = 0;

  // Monthly accumulators
  const mFixed   = new Array(12).fill(0);
  const mTracker = new Array(12).fill(0);
  const mFixedVal   = new Array(12).fill(0);
  const mTrackerVal = new Array(12).fill(0);

  // Precompute month index for each of the 8760 hours
  const hourMonth = new Array(8760);
  let mi2 = 0;
  for (let i = 0; i < 8760; i++) {
    while (mi2 < 11 && i >= MONTH_START_HOUR[mi2 + 1]) mi2++;
    hourMonth[i] = mi2;
  }
  mi2 = 0; // reset

  for (let i = 0; i < 8760; i++) {
    const mi = hourMonth[i];
    const month  = mi + 1;
    const hour   = i % 24;
    const fkwh   = acHourlyFixed[i];
    const tkwh   = acHourlyTracker[i];
    const season = tou.getSeasonal(month);
    const rates  = tou.seasonalRates[season];
    const period = tou.schedule(month, hour);
    const rate   = rates[period] ?? rates.offpeak ?? rates.peak;

    mFixed[mi]      += fkwh;
    mTracker[mi]    += tkwh;
    mFixedVal[mi]   += fkwh * rate;
    mTrackerVal[mi] += tkwh * rate;
  }

  const monthly = MONTHS.map((name, mi) => {
    fixedKwh    += mFixed[mi];
    trackerKwh  += mTracker[mi];
    fixedValue  += mFixedVal[mi];
    trackerValue+= mTrackerVal[mi];
    return {
      month:        name,
      fixedKwh:     Math.round(mFixed[mi]),
      trackerKwh:   Math.round(mTracker[mi]),
      fixedValue:   Math.round(mFixedVal[mi]),
      trackerValue: Math.round(mTrackerVal[mi]),
    };
  });

  const kwhGain    = (trackerKwh / fixedKwh - 1) * 100;
  const valGain    = (trackerValue / fixedValue - 1) * 100;
  const touPremium = valGain - kwhGain;

  return {
    fixedKwh:         Math.round(fixedKwh),
    trackerKwh:       Math.round(trackerKwh),
    fixedValue:       Math.round(fixedValue),
    trackerValue:     Math.round(trackerValue),
    kwhGain:          kwhGain.toFixed(1),
    valGain:          valGain.toFixed(1),
    touPremium:       touPremium.toFixed(1),
    fixedEffRate:     (fixedValue / fixedKwh).toFixed(3),
    trackerEffRate:   (trackerValue / trackerKwh).toFixed(3),
    extraAnnualValue: Math.round(trackerValue - fixedValue),
    monthly,
  };
}

// Build average hourly profile for a given month from actual hourly data
function buildHourlyProfile(acHourlyFixed, acHourlyTracker, utility, month) {
  const tou   = TOU_RATES[utility];
  const mi    = month - 1;
  const start = MONTH_START_HOUR[mi];
  const days  = MONTH_DAYS[mi];

  // Average kWh per hour-of-day across all days in the month
  const fAvg = new Array(24).fill(0);
  const tAvg = new Array(24).fill(0);
  for (let d = 0; d < days; d++) {
    for (let h = 0; h < 24; h++) {
      fAvg[h] += acHourlyFixed[start + d * 24 + h];
      tAvg[h] += acHourlyTracker[start + d * 24 + h];
    }
  }

  return Array.from({length:24}, (_, h) => {
    const period = tou.schedule(month, h);
    return {
      hour:    `${h}:00`,
      fixed:   parseFloat((fAvg[h] / days).toFixed(2)),
      tracker: parseFloat((tAvg[h] / days).toFixed(2)),
      isPeak:  period === "peak",
      isSOP:   period === "superoffpeak",
    };
  });
}

// Pick closest lat-bin for a given latitude
function getElevTable(lat) {
  const bins = [32, 34, 37, 39];
  const closest = bins.reduce((a, b) => Math.abs(b - lat) < Math.abs(a - lat) ? b : a);
  return SOLAR_ELEVATION_BY_LAT[closest];
}

// Apply minimum elevation constraint to a full 8760-hour tracker array
// When sun is above horizon but below minElev, tracker holds at minElev
// The panel points above the sun — AOI = (minElev - solarElev)
// Output = true_tracking_output * cos(AOI) — always <= true tracking
function applyElevLimitToHourly(trackerHourly, lat, minElev) {
  if (minElev <= 0) return trackerHourly;
  const elevTable = getElevTable(lat);
  // Build month lookup array: for each of 8760 hours, which month (1-12)?
  const MS = [0,744,1416,2160,2880,3624,4344,5088,5832,6552,7296,8016];
  const hourToMonth = new Array(8760);
  for (let mi = 0; mi < 12; mi++) {
    const end = mi < 11 ? MS[mi+1] : 8760;
    for (let i = MS[mi]; i < end; i++) hourToMonth[i] = mi + 1;
  }
  const result = new Array(8760);
  for (let i = 0; i < 8760; i++) {
    const month = hourToMonth[i];
    const hour = i % 24;
    const solarElev = elevTable[String(month)][hour];
    const tkwh = trackerHourly[i];
    // Only constrain when sun is above horizon AND below the limit
    if (solarElev > 0 && solarElev < minElev) {
      const aoi = (minElev - solarElev) * Math.PI / 180;
      result[i] = tkwh * Math.cos(aoi);
    } else {
      result[i] = tkwh;
    }
  }
  return result;
}


// ─── VALIDATED INPUT COMPONENT ───────────────────────────────────────────────
// Shows red border + error message when value is out of range
// onChange receives { raw, num, valid }
function ValidatedInput({ label, value, unit, min, max, step, hint, onChange }) {
  const num = parseFloat(value);
  const outOfRange = !isNaN(num) && (num < min || num > max);
  const empty = value === "" || value === "-";
  const invalid = empty || isNaN(num) || outOfRange;

  const borderColor = outOfRange ? "#f78166" : "#30363d";
  const msgColor = "#f78166";

  return (
    <div>
      <div style={{fontSize:11,color:"#8b949e",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600}}>
        {label}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <input
          type="number" min={min} max={max} step={step} value={value}
          onChange={e => {
            const raw = e.target.value;
            const n = parseFloat(raw);
            const valid = !isNaN(n) && n >= min && n <= max;
            onChange({ raw, num: n, valid });
          }}
          style={{
            background:"#161b22",
            border:`1px solid ${borderColor}`,
            color: outOfRange ? "#f78166" : "#e6edf3",
            padding:"7px 10px", borderRadius:6,
            fontSize:13, width:90, textAlign:"right",
            outline: outOfRange ? "none" : undefined,
            boxShadow: outOfRange ? "0 0 0 2px #f7816630" : "none",
          }}
        />
        {unit && <span style={{fontSize:11,color:"#8b949e"}}>{unit}</span>}
      </div>
      {outOfRange && (
        <div style={{fontSize:10,color:msgColor,marginTop:3,fontWeight:600}}>
          Max {max}{unit} · Min {min}{unit}
        </div>
      )}
      {!outOfRange && hint && (
        <div style={{fontSize:10,color:"#9ca8b4",marginTop:3}}>{hint}</div>
      )}
    </div>
  );
}

// HOLIDAYS — treated as weekends for ACC rate lookup
const HOLIDAYS_2026 = new Set([
  '2026-01-01','2026-02-16','2026-05-25','2026-07-04',
  '2026-09-07','2026-11-11','2026-11-26','2026-12-25'
]);

function isWeekendOrHoliday(date) {
  const d = date.getDay(); // 0=Sun, 6=Sat
  const key = date.toISOString().slice(0,10);
  return d === 0 || d === 6 || HOLIDAYS_2026.has(key);
}

function getAccExportRate(month, hour, date) {
  const we = isWeekendOrHoliday(date) ? 1 : 0;
  return ACC_EXPORT_RATES[month]?.[hour]?.[we] ?? 0.07;
}

// ─── GREEN BUTTON CSV PARSER ──────────────────────────────────────────────────
// Supports two SDG&E tab-delimited formats:
//   Format A (residential): separate Date / Start Time / Consumption columns
//   Format B (commercial):  combined interval_start (M/D/YY H:MM) + interval_kWh
// Returns { hourMap, startDate }
function parseGreenButtonCSV(text) {
  const lines = text.split(/\r?\n/);
  const delim = lines[0].includes('\t') ? '\t' : ',';

  // ── Find header row ────────────────────────────────────────────────────────
  let headerIdx = -1;
  let mode = null; // 'A' or 'B'
  let dateCol = -1, timeCol = -1, useCol = -1, startCol = -1;

  for (let i = 0; i < Math.min(40, lines.length); i++) {
    const cols = lines[i].split(delim).map(c => c.trim().replace(/^"|"$/g,''));

    // Format B: commercial — interval_start + interval_kWh
    const si = cols.findIndex(c => /^interval_start$/i.test(c));
    const ki = cols.findIndex(c => /^interval_kwh$/i.test(c));
    if (si >= 0 && ki >= 0) {
      headerIdx = i; mode = 'B'; startCol = si; useCol = ki;
      break;
    }

    // Format A: residential — Date + Start Time + Consumption
    const di = cols.findIndex(c => /^date$/i.test(c));
    const ti = cols.findIndex(c => /start.?time/i.test(c));
    const ui = cols.findIndex(c => /consumption|kWh|usage/i.test(c));
    if (di >= 0 && ti >= 0 && ui >= 0) {
      headerIdx = i; mode = 'A'; dateCol = di; timeCol = ti; useCol = ui;
      break;
    }
  }

  if (headerIdx < 0 || !mode) {
    throw new Error(
      "Unrecognized CSV format. Expected SDG&E residential (Date / Start Time / Consumption) " +
      "or commercial (interval_start / interval_kWh) tab-delimited export."
    );
  }

  // ── Parse rows ─────────────────────────────────────────────────────────────
  const intervals = [];

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(delim).map(c => c.trim().replace(/^"|"$/g,''));

    let year, month, day, hour, minute, kwh;

    if (mode === 'B') {
      // "8/9/25 23:45"  or  "8/9/2025 23:45"
      if (cols.length <= Math.max(startCol, useCol)) continue;
      const raw = cols[startCol];
      const m = raw.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
      if (!m) continue;
      month = parseInt(m[1]); day = parseInt(m[2]);
      year  = parseInt(m[3]) < 100 ? 2000 + parseInt(m[3]) : parseInt(m[3]);
      hour  = parseInt(m[4]); minute = parseInt(m[5]);
      kwh   = parseFloat(cols[useCol]);

    } else {
      // Format A — separate date / time columns
      if (cols.length <= Math.max(dateCol, timeCol, useCol)) continue;
      const dateStr = cols[dateCol];
      const timeStr = cols[timeCol];
      kwh = parseFloat(cols[useCol]);
      if (!dateStr) continue;
      const dp = dateStr.match(/(\d+)[\/\-](\d+)[\/\-](\d+)/);
      if (!dp) continue;
      if (parseInt(dp[3]) > 100) {
        month = parseInt(dp[1]); day = parseInt(dp[2]); year = parseInt(dp[3]);
      } else {
        year = parseInt(dp[1]); month = parseInt(dp[2]); day = parseInt(dp[3]);
      }
      const tp = timeStr.match(/(\d+):(\d+)/);
      if (!tp) continue;
      hour = parseInt(tp[1]); minute = parseInt(tp[2]);
    }

    if (isNaN(kwh) || isNaN(hour)) continue;
    intervals.push({ year, month, day, hour, minute, kwh });
  }

  if (intervals.length < 24) {
    throw new Error("Not enough data rows in CSV (found " + intervals.length + "). Check file format.");
  }

  // ── Sort ascending, trim to most recent 365 days ───────────────────────────
  intervals.sort((a, b) => {
    const da = new Date(a.year, a.month-1, a.day, a.hour, a.minute);
    const db = new Date(b.year, b.month-1, b.day, b.hour, b.minute);
    return da - db;
  });

  const last = intervals[intervals.length - 1];
  const lastDate = new Date(last.year, last.month-1, last.day);
  const cutoff = new Date(lastDate);
  cutoff.setDate(cutoff.getDate() - 365);
  const trimmed = intervals.filter(r => new Date(r.year, r.month-1, r.day) >= cutoff);

  // ── Aggregate 15-min → hourly ──────────────────────────────────────────────
  // For Format B the interval_start timestamp marks the END of the interval,
  // so we attribute each reading to (interval_start minus 15 min).hour.
  const hourMap = {};
  for (const r of trimmed) {
    let { year: y, month: mo, day: d, hour: h, minute: mi, kwh: v } = r;
    if (mode === 'B') {
      // shift back 15 min so 23:45→00:00 reads map to hour 23, not hour 0
      const dt = new Date(y, mo-1, d, h, mi);
      dt.setMinutes(dt.getMinutes() - 15);
      y = dt.getFullYear(); mo = dt.getMonth()+1;
      d = dt.getDate(); h = dt.getHours();
    }
    const key = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}-${String(h).padStart(2,'0')}`;
    if (!hourMap[key]) hourMap[key] = { year: y, month: mo, day: d, hour: h, kwh: 0 };
    hourMap[key].kwh += v;
  }

  const first = trimmed[0];
  // For mode B, first row after sort is oldest interval_start; back-shift it too
  let startDate;
  if (mode === 'B') {
    const dt = new Date(first.year, first.month-1, first.day, first.hour, first.minute);
    dt.setMinutes(dt.getMinutes() - 15);
    startDate = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  } else {
    startDate = new Date(first.year, first.month-1, first.day);
  }

  return { hourMap, startDate, totalIntervals: trimmed.length, mode };
}

// ─── BILLING ENGINE ───────────────────────────────────────────────────────────
// Computes full bill with and without solar, including demand charges
// billCycleDay: day of month billing period starts (1-28)
// Returns detailed monthly breakdown
const MONTH_DAYS_STD = [31,28,31,30,31,30,31,31,30,31,30,31];

function computeBill(hourMap, solarHourly, rateKey, billCycleDay, startDate) {
  const tou = TOU_RATES[rateKey];
  const hasDemand = !!tou.hasDemandCharges;

  // Build billing periods — 12 periods starting from billCycleDay
  // Anchor to the start of the data
  const anchorYear = startDate.getFullYear();
  const anchorMonth = startDate.getMonth(); // 0-indexed

  // Generate 12 billing period start dates
  const periods = [];
  let y = anchorYear, m = anchorMonth;
  // Find first period start on or before startDate
  let periodStart = new Date(y, m, billCycleDay);
  if (periodStart > startDate) {
    m--;
    if (m < 0) { m = 11; y--; }
    periodStart = new Date(y, m, billCycleDay);
  }

  for (let p = 0; p < 12; p++) {
    const pStart = new Date(periodStart);
    pStart.setMonth(pStart.getMonth() + p);
    const pEnd = new Date(pStart);
    pEnd.setMonth(pEnd.getMonth() + 1);
    periods.push({ start: pStart, end: pEnd });
  }

  const results = [];

  for (const period of periods) {
    let baseEnergyCost = 0, solarEnergyCost = 0;
    let baseExport = 0, solarExport = 0;
    let baseKwh = 0, solarNetKwh = 0, solarGenKwh = 0;

    // Demand tracking — peak kW by period type
    let baseNonCoincidentPeak = 0, baseSummerOnPeakPeak = 0, baseWinterOnPeakPeak = 0;
    let solarNonCoincidentPeak = 0, solarSummerOnPeakPeak = 0, solarWinterOnPeakPeak = 0;

    const isSummerPeriod = period.start.getMonth() >= 5 && period.start.getMonth() <= 9; // Jun-Oct

    // Iterate days in period
    const cur = new Date(period.start);
    while (cur < period.end) {
      const y = cur.getFullYear();
      const mo = cur.getMonth() + 1;
      const d = cur.getDate();
      const isWE = isWeekendOrHoliday(cur);
      const isSummer = mo >= 6 && mo <= 10;

      for (let h = 0; h < 24; h++) {
        const key = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}-${String(h).padStart(2,'0')}`;
        const loadKwh = hourMap[key]?.kwh ?? 0;
        
        // Solar index — map to 8760 array
        const doy = Math.floor((cur - new Date(y, 0, 0)) / 86400000);
        const solarIdx = Math.min((doy - 1) * 24 + h, 8759);
        const genKwh = solarHourly ? (solarHourly[solarIdx] ?? 0) : 0;

        const netKwh = loadKwh - genKwh;
        const importKwh = Math.max(0, netKwh);
        const exportKwh = Math.max(0, -netKwh);

        // TOU rate for this hour
        const season = tou.getSeasonal(mo);
        const period_type = tou.schedule(mo, h);
        const rate = tou.seasonalRates[season][period_type] ?? tou.seasonalRates[season].offpeak;

        // ACC export rate
        const exportRate = getAccExportRate(mo, h, cur);

        // Energy costs
        baseEnergyCost += loadKwh * rate;
        solarEnergyCost += importKwh * rate;
        baseExport += 0; // no solar baseline
        solarExport += exportKwh * exportRate;

        baseKwh += loadKwh;
        solarNetKwh += importKwh;
        solarGenKwh += genKwh;

        // Demand tracking (kW = kWh for hourly data)
        if (hasDemand) {
          baseNonCoincidentPeak = Math.max(baseNonCoincidentPeak, loadKwh);
          solarNonCoincidentPeak = Math.max(solarNonCoincidentPeak, importKwh);
          if (period_type === "peak") {
            if (isSummer) {
              baseSummerOnPeakPeak = Math.max(baseSummerOnPeakPeak, loadKwh);
              solarSummerOnPeakPeak = Math.max(solarSummerOnPeakPeak, importKwh);
            } else {
              baseWinterOnPeakPeak = Math.max(baseWinterOnPeakPeak, loadKwh);
              solarWinterOnPeakPeak = Math.max(solarWinterOnPeakPeak, importKwh);
            }
          }
        }
      }
      cur.setDate(cur.getDate() + 1);
    }

    // Compute demand charges
    let baseDemandCost = 0, solarDemandCost = 0;
    if (hasDemand) {
      const dc = tou.demandCharges;
      baseDemandCost = baseNonCoincidentPeak * dc.nonCoincident
        + baseSummerOnPeakPeak * dc.summerOnPeak
        + baseWinterOnPeakPeak * dc.winterOnPeak;
      solarDemandCost = solarNonCoincidentPeak * dc.nonCoincident
        + solarSummerOnPeakPeak * dc.summerOnPeak
        + solarWinterOnPeakPeak * dc.winterOnPeak;
    }

    const baseBill = baseEnergyCost + baseDemandCost;
    const solarBill = solarEnergyCost + solarDemandCost - solarExport;
    const savings = baseBill - solarBill;

    results.push({
      label: period.start.toLocaleDateString('en-US', {month:'short', year:'numeric'}),
      baseEnergy: Math.round(baseEnergyCost),
      baseDemand: Math.round(baseDemandCost),
      baseBill: Math.round(baseBill),
      solarEnergy: Math.round(solarEnergyCost),
      solarDemand: Math.round(solarDemandCost),
      exportCredit: Math.round(solarExport),
      solarBill: Math.round(solarBill),
      savings: Math.round(savings),
      baseKwh: Math.round(baseKwh),
      solarGenKwh: Math.round(solarGenKwh),
      baseNonCoincidentPeak: Math.round(baseNonCoincidentPeak * 10) / 10,
      solarNonCoincidentPeak: Math.round(solarNonCoincidentPeak * 10) / 10,
    });
  }

  const totals = results.reduce((acc, r) => ({
    baseEnergy: acc.baseEnergy + r.baseEnergy,
    baseDemand: acc.baseDemand + r.baseDemand,
    baseBill: acc.baseBill + r.baseBill,
    solarEnergy: acc.solarEnergy + r.solarEnergy,
    solarDemand: acc.solarDemand + r.solarDemand,
    exportCredit: acc.exportCredit + r.exportCredit,
    solarBill: acc.solarBill + r.solarBill,
    savings: acc.savings + r.savings,
    baseKwh: acc.baseKwh + r.baseKwh,
    solarGenKwh: acc.solarGenKwh + r.solarGenKwh,
  }), { baseEnergy:0, baseDemand:0, baseBill:0, solarEnergy:0, solarDemand:0, exportCredit:0, solarBill:0, savings:0, baseKwh:0, solarGenKwh:0 });

  return { monthly: results, totals, hasDemand };
}

                {/* ── Row 1: Common to both arrays ──────────────────────────── */}

                    <td style={{color:C.yellow,padding:"5px 8px",textAlign:"right"}}>${billAnalysis.totals.exportCredit.toLocaleString()}</td>

{/* Error */}

              </button>
            </div>

            {/* Effective rate row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {[
                { label:"Fixed — Effective $/kWh earned",   val:"$"+results.fixedEffRate,   color:C.blue  },
                { label:"Tracker — Effective $/kWh earned", val:"$"+results.trackerEffRate, color:C.green },
              ].map(c => (
                <div key={c.label} style={{background:C.surface,borderRadius:8,padding:"12px 16px",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,color:C.muted}}>{c.label}</span>
                  <span style={{fontSize:19,fontWeight:700,color:c.color}}>{c.val}</span>
                </div>
              ))}
            </div>

            {/* Hourly profile chart */}
            <div style={{background:C.surface,borderRadius:8,padding:"16px",border:`1px solid ${C.border}`,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:14,fontWeight:600,color:C.text}}>Hourly Output Profile — Peak Window Overlay</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {MONTHS.map((mn,i) => (
                    <button key={i} onClick={() => setChartMonth(i+1)}
                      style={{padding:"3px 8px",borderRadius:4,border:"1px solid",fontSize:11,cursor:"pointer",
                        background: chartMonth===i+1 ? "#1f6feb" : "transparent",
                        borderColor: chartMonth===i+1 ? "#58a6ff" : C.border,
                        color: chartMonth===i+1 ? "#ffffff" : C.muted}}>
                      {mn}
                    </button>
                  ))}
                </div>
              </div>
              <ResponsiveContainer width="100%" height={260}>
                <LineChart data={hourly} margin={{top:5,right:10,left:-10,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#21262d" />
                  {hourly.map((d,i) => d.isPeak && (
                    <ReferenceLine key={i} x={d.hour} stroke="#f7816630" strokeWidth={28} />
                  ))}
                  <XAxis dataKey="hour" tick={{fill:C.muted,fontSize:11}} interval={2} />
                  <YAxis tick={{fill:C.muted,fontSize:11}} unit=" kW" domain={[0,"auto"]} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend wrapperStyle={{fontSize:12,color:C.muted}} />
                  <Line type="monotone" dataKey="fixed"   stroke={C.blue}  strokeWidth={2} dot={false} name="Fixed 15°" />
                  <Line type="monotone" dataKey="tracker" stroke={C.green} strokeWidth={2} dot={false} name={minElev > 0 ? `Tracker (${minElev}° limit)` : "2-Axis Tracker"} />
                  {minElev > 0 && hourly && hourly[0]?.trackerUnlimited !== undefined && (
                    <Line type="monotone" dataKey="trackerUnlimited" stroke={C.green} strokeWidth={1.5} strokeDasharray="5 4" dot={false} name="Tracker (unlimited)" />
                  )}
                </LineChart>
              </ResponsiveContainer>
              <div style={{fontSize:12,color:C.muted,marginTop:6}}>
                🟠 Shaded band = Peak TOU window (4–9 PM) · Hourly shape derived from monthly PVWatts totals
              </div>
            </div>

            {/* Monthly value bar chart */}
            <div style={{background:C.surface,borderRadius:8,padding:"16px",border:`1px solid ${C.border}`,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:12}}>Monthly Dollar Value</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={results.monthly} margin={{top:5,right:10,left:10,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#21262d" />
                  <XAxis dataKey="month" tick={{fill:C.muted,fontSize:11}} />
                  <YAxis tick={{fill:C.muted,fontSize:11}} tickFormatter={v => "$"+Math.round(v/1000)+"k"}
                    domain={[0, dataMax => Math.ceil(dataMax * 1.08 / 100) * 100]} width={52} />
                  <Tooltip formatter={(v,n) => ["$"+v.toLocaleString(), n]} contentStyle={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,fontSize:12}} />
                  <Legend wrapperStyle={{fontSize:12,color:C.muted}} />
                  <Bar dataKey="fixedValue"   fill="#1f6feb" name="Fixed 15°" radius={[2,2,0,0]} />
                  <Bar dataKey="trackerValue" fill="#238636" name="Tracker"   radius={[2,2,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            {/* Monthly table */}
            <div style={{background:C.surface,borderRadius:8,padding:"16px",border:`1px solid ${C.border}`,overflowX:"auto",marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:12}}>Monthly Detail</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr>
                    {["Month","Fixed kWh","Tracker kWh","kWh Gain","Fixed $","Tracker $","$ Gain"].map(h => (
                      <th key={h} style={{color:C.muted,textAlign:"right",padding:"5px 10px",borderBottom:`1px solid ${C.border}`,fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {results.monthly.map((row,ri) => {
                    const kg = ((row.trackerKwh / row.fixedKwh - 1) * 100).toFixed(0);
                    const vg = ((row.trackerValue / row.fixedValue - 1) * 100).toFixed(0);
                    return (
                      <tr key={row.month} style={{background: ri%2===0 ? "transparent" : "#0d111780", borderBottom:`1px solid ${C.border}20`}}>
                        <td style={{color:C.text,  padding:"6px 10px",textAlign:"right",fontWeight:600}}>{row.month}</td>
                        <td style={{color:C.blue,  padding:"6px 10px",textAlign:"right"}}>{row.fixedKwh.toLocaleString()}</td>
                        <td style={{color:C.green, padding:"6px 10px",textAlign:"right"}}>{row.trackerKwh.toLocaleString()}</td>
                        <td style={{color:C.purple,padding:"6px 10px",textAlign:"right"}}>+{kg}%</td>
                        <td style={{color:C.blue,  padding:"6px 10px",textAlign:"right"}}>${row.fixedValue.toLocaleString()}</td>
                        <td style={{color:C.green, padding:"6px 10px",textAlign:"right"}}>${row.trackerValue.toLocaleString()}</td>
                        <td style={{color:C.orange,padding:"6px 10px",textAlign:"right",fontWeight:700}}>+{vg}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* Disclaimer */}
        <div style={{fontSize:11,color:C.muted,borderTop:`1px solid ${C.border}`,paddingTop:12,lineHeight:1.6}}>
          Production data from NREL PVWatts v8 API using NSRDB PSM V3 TMY weather data (4 km resolution).
          Fixed array: 15° tilt, south-facing (azimuth 180°). Tracker: dual-axis (array_type=4), NREL models incidence angle = 0 each hour.
          Fixed DC:AC ratio 1.2 · Tracker DC:AC ratio 1.1 (larger inverter captures sustained tracking output) · System losses 14% · Premium modules (module_type=1).
          Dollar value computed from actual 8,760-hour PVWatts output — each hour assigned exact TOU rate. No shape model or approximation.
          SDG&E TOU-A rates effective Feb 1, 2025. SDG&E AL-TOU rates effective Oct 1, 2025. Secondary voltage, bundled service.
          SDG&E TOU-DR1 &amp; DR-SES rates effective Oct 1, 2025. EV-TOU-5 rates effective Jan 1, 2026. Bundled residential service.
          SCE and PG&E rates are approximate — verify current tariffs before customer presentation.
          NEM 3.0 export rate (~$0.08/kWh avg) not modeled — assumes full self-consumption.
          DEMO_KEY limited to 1,000 req/hr (shared). Register a free key at developer.nrel.gov for production use.
        </div>

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
